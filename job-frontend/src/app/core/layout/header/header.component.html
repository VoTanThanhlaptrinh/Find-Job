<header
  id="header"
  class="transition-colors duration-300 fixed"
  [ngClass]="{
    'bg-black': isScrolled,
    'bg-transparent': !isScrolled,
  }"
>
  <div class="container">
    <div class="flex justify-between items-center">
      <div id="logo">
        <a href="/"><img src="assets/web_css/img/logo.png" alt="" title="" /></a>
      </div>
      <c-navbar id="nav-menu-container" expand="lg">
        <c-container>
          <c-navbar-nav class="nav-menu">
            <ng-container>
              <c-nav-item class="menu-active">
                <a cNavLink href="/">Trang chu</a>
              </c-nav-item>
              <c-nav-item>
                <a cNavLink href="/category">Tim viec</a>
              </c-nav-item>
            </ng-container>

            <c-nav-item>
              <a cNavLink href="/blogHome">Blog</a>
            </c-nav-item>
            <c-nav-item>
              <a cNavLink href="/contact">Lien he</a>
            </c-nav-item>
            <c-nav-item>
              <a cNavLink href="/about">Thong tin</a>
            </c-nav-item>
            @if (isLoggedIn) {
              <ng-container>
                <c-dropdown
                  variant="nav-item"
                  [popper]="false"
                  autoClose="outside"
                >
                  <c-nav-item>
                    <a cDropdownToggle cNavLink style="color: aliceblue">Tai khoan</a>
                  </c-nav-item>
                  <ul cDropdownMenu>
                    <li>
                      <button cDropdownItem (click)="goInfor()">
                        Thong tin ca nhan
                      </button>
                    </li>
                    <li>
                      <button cDropdownItem (click)="goVerify()">
                        Kich hoat tai khoan
                      </button>
                    </li>
                    <li>
                      <button cDropdownItem (click)="logout()">
                        Dang xuat
                      </button>
                    </li>
                  </ul>
                </c-dropdown>
              </ng-container>
            } @else {
              <ng-container class="flex flex-row justify-between w-full gap-x-2">
                @if (isLoginPage) {
                  <c-nav-item
                    class="bg-white rounded-lg border-blue-900 border-2! px-4 py-2 mr-2"
                  >
                    <a cNavLink href="/login" class="text-black!">Dang nhap</a>
                  </c-nav-item>
                } @else {
                  <c-nav-item class="rounded-lg bg-blue-500 px-4 py-2 mr-2">
                    <a cNavLink href="/login">Dang nhap</a>
                  </c-nav-item>
                }
                @if (isRegisterPage) {
                  <c-nav-item
                    class="bg-white rounded-lg border-blue-900 border-2! px-4 py-2"
                  >
                    <a cNavLink href="/register" class="text-black!">Dang ky</a>
                  </c-nav-item>
                } @else {
                  <c-nav-item class="rounded-lg bg-blue-500 px-4 py-2">
                    <a cNavLink href="/register">Dang ky</a>
                  </c-nav-item>
                }
              </ng-container>
            }
          </c-navbar-nav>
        </c-container>
      </c-navbar>
    </div>
  </div>
</header>
