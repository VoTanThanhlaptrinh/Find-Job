<header
  id="header"
  class="transition-colors duration-300 fixed"
  [ngClass]="{
    'bg-black': isScrolled,
    'bg-transparent': !isScrolled,
  }"
>
  <div class="container">
    <div class="flex justify-between items-center">
      <div id="logo">
        <a href="/"
          ><img src="assets/web_css/img/logo.png" alt="" title=""
        /></a>
      </div>
      <c-navbar id="nav-menu-container" expand="lg">
        <c-container [fluid]="true">
          <c-navbar-nav class="nav-menu">
            <ng-container>
              <c-nav-item class="menu-active">
                <a cNavLink href="/">Trang chủ</a>
              </c-nav-item>
              <c-nav-item>
                <a cNavLink href="/category">Tìm việc</a>
              </c-nav-item>
            </ng-container>

            <c-nav-item>
              <a cNavLink href="/blogHome">Blog</a>
            </c-nav-item>
            <c-nav-item>
              <a cNavLink href="/contact">Liên hệ</a>
            </c-nav-item>
            <c-nav-item>
              <a cNavLink href="/about">Thông tin</a>
            </c-nav-item>
            @if (isLogin()) {
              <ng-container>
                <c-dropdown
                  variant="nav-item"
                  [popper]="false"
                  autoClose="outside"
                >
                  <c-nav-item>
                    <a cDropdownToggle cNavLink style="color: aliceblue"
                      >Tài khoản</a
                    >
                  </c-nav-item>
                  <ul cDropdownMenu>
                    <li>
                      <button cDropdownItem (click)="goInfor()">
                        Thông tin cá nhân
                      </button>
                    </li>
                    <li>
                      <button cDropdownItem (click)="goVerify()">
                        Kích hoạt tài khoản
                      </button>
                    </li>
                    <li>
                      <button cDropdownItem (click)="logout()">
                        Đăng xuất
                      </button>
                    </li>
                  </ul>
                </c-dropdown>
              </ng-container>
            } @else {
              <ng-container
                class="flex flex-row justify-between w-full gap-x-2"
              >
                @if (isPageLogin()) {
                  <c-nav-item
                    class="bg-white rounded-lg border-blue-900 border-2! px-4 py-2 mr-2"
                  >
                    <a cNavLink href="/login" class="text-black!">Đăng nhập</a>
                  </c-nav-item>
                } @else {
                  <c-nav-item class="rounded-lg bg-blue-500 px-4 py-2 mr-2">
                    <a cNavLink href="/login">Đăng nhập</a>
                  </c-nav-item>
                }
                @if (isPageRegister()) {
                  <c-nav-item
                    class="bg-white rounded-lg border-blue-900 border-2! px-4 py-2"
                  >
                    <a cNavLink href="/register" class="text-black!">Đăng ký</a>
                  </c-nav-item>
                } @else {
                  <c-nav-item class="rounded-lg bg-blue-500 px-4 py-2">
                    <a cNavLink href="/register">Đăng ký</a>
                  </c-nav-item>
                }
              </ng-container>
            }
            <!-- Nếu chưa đăng nhập -->
          </c-navbar-nav>
          <!-- </div> -->
        </c-container>
      </c-navbar>
    </div>
  </div>
</header>
