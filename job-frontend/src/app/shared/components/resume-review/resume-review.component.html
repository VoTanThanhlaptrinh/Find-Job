<article
  class="m-2 rounded-xl border border-slate-300 bg-white p-2 shadow-md"
>
  <div class="flex items-center gap-3 sm:gap-4">
    <img
      [src]="fileIconPath"
      alt="Biểu tượng file CV"
      title="Biểu tượng file CV"
      class="h-16 w-16 shrink-0 rounded-xl border border-slate-200 bg-slate-50 object-contain p-1 sm:h-20 sm:w-20"
      loading="lazy"
    />

    <div class="min-w-0 flex-1">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <h4 class="truncate text-xl font-semibold text-slate-900 sm:text-2xl">
            {{ resume.fileName }}
          </h4>
          <p class="mt-1 text-sm text-slate-700 sm:text-base">
            {{ createDateLabel }}
          </p>
        </div>

        <div class="relative">
          <button
            type="button"
            class="inline-flex h-9 w-9 items-center border-none justify-center text-black bg-white hover:bg-slate-100"
            aria-label="Tùy chọn thêm"
            (click)="toggleMenu()"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="currentColor"
              class="h-4 w-4"
              aria-hidden="true"
            >
              <circle cx="5" cy="12" r="1.8" />
              <circle cx="12" cy="12" r="1.8" />
              <circle cx="19" cy="12" r="1.8" />
            </svg>
          </button>

          @if (isMenuOpen) {
            <div
              class="absolute right-0 z-10 mt-1 min-w-30 rounded-lg border bg-white p-1 shadow-lg"
            >
              <button
                type="button"
                class="w-full rounded-md px-3 py-1.5 text-center text-sm font-medium text-black hover:bg-gray-300 transition"
                [disabled]="isDeleting"
                (click)="onDeleteResume()"
              >
                {{ isDeleting ? "Đang xóa..." : "Xóa" }}
              </button>
            </div>
          }
        </div>
      </div>

      <div class="flex items-center gap-3">
        <button
          type="button"
          class="inline-flex h-10 w-10 items-center justify-center rounded-lg border-none text-black hover:bg-blue-100"
          title="Xem CV"
          aria-label="Xem CV"
          (click)="onViewResume()"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            class="h-5 w-5"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M2.036 12.322a1 1 0 0 1 0-.644C3.423 7.51 7.36 4.5 12 4.5s8.577 3.01 9.964 7.178a1 1 0 0 1 0 .644C20.577 16.49 16.64 19.5 12 19.5s-8.577-3.01-9.964-7.178Z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
            />
          </svg>
        </button>

        <button
          type="button"
          class="inline-flex h-10 w-10 items-center justify-center rounded-lg text-black hover:bg-blue-200"
          title="Tải CV"
          aria-label="Tải CV"
          (click)="onDownloadResume()"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            class="h-5 w-5"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 16.5V4.5"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m16.5 12-4.5 4.5L7.5 12"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M21 19.5a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 19.5"
            />
          </svg>
        </button>
      </div>
    </div>
  </div>
</article>
