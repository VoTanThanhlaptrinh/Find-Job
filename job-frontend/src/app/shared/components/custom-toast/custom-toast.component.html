<div
  class="relative pointer-events-auto flex items-start p-4 mb-4 rounded-xl shadow-lg border backdrop-blur-md bg-white/90 border-slate-200/60 overflow-hidden min-w-[320px] max-w-[400px] hover:shadow-xl transition-shadow"
  [@flyInOut]="state()"
  (click)="tapToast()"
>
  <!-- Background progress bar (if configured) -->
  <div *ngIf="options().progressBar" class="absolute bottom-0 left-0 h-1 bg-black/10 w-full">
    <div
      class="h-full transition-all duration-300 ease-linear"
      [style.width.%]="width()"
      [ngClass]="{
        'bg-emerald-500': toastPackage.toastType === 'toast-success',
        'bg-red-500': toastPackage.toastType === 'toast-error',
        'bg-orange-500': toastPackage.toastType === 'toast-warning',
        'bg-blue-500': toastPackage.toastType === 'toast-info'
      }"
    ></div>
  </div>

  <!-- Icon -->
  <div class="flex-shrink-0 flex items-center justify-center mr-3 mt-0.5" [innerHTML]="iconSvg">
  </div>

  <!-- Content -->
  <div class="flex-1 flex flex-col justify-center gap-1 mt-0.5 pb-1">
    <h4 *ngIf="title()" class="text-sm font-semibold text-slate-800 leading-tight">
      {{ title() }}
    </h4>
    <p *ngIf="message()" class="text-sm text-slate-600 leading-snug break-words" [innerHTML]="message()">
    </p>
  </div>

  <!-- Close button -->
  <button
    *ngIf="options().closeButton"
    type="button"
    class="flex-shrink-0 ml-3 text-slate-400 hover:text-slate-600 transition-colors bg-slate-50 hover:bg-slate-100 rounded-full p-1.5 focus:outline-none focus:ring-2 focus:ring-slate-200"
    (click)="remove()"
    aria-label="Close"
  >
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>
</div>
