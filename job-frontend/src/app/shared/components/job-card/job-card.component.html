<div
  class="flex w-full max-w-4xl min-h-37.5 sm:min-w-[80vw] lg:min-w-[50vw] bg-white border relative border-slate-200 rounded-xl px-4 py-2 hover:border-blue-600 hover:shadow-xl hover:shadow-blue-900/5 transition-all duration-300 group cursor-pointer overflow-hidden shadow-md mt-2 justify-between items-center"
>
  <div
    class="flex flex-col md:flex-row md:items-center justify-between gap-6 z-10"
  >
    <div class="flex items-center gap-5">
      <div
        class="w-fit h-fit rounded-xl bg-slate-50 shrink-0 flex items-center justify-center overflow-hidden border border-slate-100 group-hover:border-blue-100 transition-colors duration-300"
      >
        <img
          title="img"
          class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
          [src]="image"
          [alt]="job.title"
        />
      </div>

      <div>
        <a [routerLink]="[detailRoute, job.id]" class="block no-underline">
          <h3
            class="text-xl font-bold text-slate-900 group-hover:text-blue-600 transition-colors duration-300 leading-tight"
          >
            {{ job.title }}
          </h3>

          <p class="text-slate-600 text-sm font-semibold mt-1">
            Lumina Systems Inc.
          </p>

          <div
            class="flex flex-wrap items-center gap-3 mt-2 text-sm text-slate-500"
          >
            <div class="flex items-center gap-1">
              <span class="material-symbols-outlined text-[18px]"
                >location_on</span
              >
              <span>{{ job.address }}</span>
            </div>

            <span class="text-slate-300">&bull;</span>

            <div class="flex items-center gap-1 font-bold text-slate-700">
              <span>{{ formatMoney(job.salary) }}</span>
            </div>

            <span class="text-slate-300">&bull;</span>

            <div class="flex items-center gap-1">
              <span class="material-symbols-outlined text-[18px]"
                >schedule</span
              >
              <span>{{ job.time }}</span>
            </div>
          </div>
        </a>
      </div>
    </div>

    <div
      class="absolute top-1 right-1 items-center justify-between md:justify-end gap-6 w-full md:w-auto"
    >
      <div class="flex items-center gap-2">
        <button
          class="w-10 h-10 flex items-center justify-center rounded-full text-slate-400 hover:text-blue-600 hover:bg-blue-50 transition-all duration-200"
          title="Save Job"
          type="button"
        >
          <span
            class="material-symbols-outlined"
            style="font-variation-settings: &quot;FILL&quot; 1"
            >bookmark</span
          >
        </button>
      </div>
    </div>
  </div>
</div>
