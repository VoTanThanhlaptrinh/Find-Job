<section class="company-address-page" (click)="closeMenu()">
	<header class="page-header">
		<div>
			<h1>Dia chi cong ty</h1>
			<p>Quan ly danh sach dia chi dang hien thi tren tin tuyen dung.</p>
		</div>
		<button type="button" class="add-address-btn">Them dia chi</button>
	</header>

	<div class="address-list" *ngIf="addresses.length; else emptyState">
		<article class="address-card" *ngFor="let address of addresses; trackBy: trackByAddressId">
			<div class="address-content">
				<h2>{{ address.locationName }}</h2>
				<!-- <p><strong>Nguoi lien he:</strong> {{ address.contactName }}</p>
				<p><strong>So dien thoai:</strong> {{ address.phone }}</p> -->
				<p><strong>Dia chi:</strong> {{ address.fullAddress }}</p>
			</div>

			<div class="card-action-wrap" (click)="$event.stopPropagation()">
				<button type="button" class="kebab-btn text-black" (click)="toggleMenu(address.id)">...</button>
				<div class="action-menu" *ngIf="openMenuId === address.id">
					<button type="button" class="delete-btn" (click)="deleteAddress(address)">Xoa</button>
				</div>
			</div>
		</article>
	</div>

	<ng-template #emptyState>
		<div class="empty-state">
			Chua co dia chi nao. Bam "Them dia chi" de bat dau.
		</div>
	</ng-template>
</section>
