<section class="dashboard-shell">
  <div class="dashboard-layout">
    <aside class="left-sidebar">
      <div class="brand-block">
        <span class="brand-mark">RD</span>
        <div>
          <p class="brand-title">Recruiter Dashboard</p>
          <p class="brand-sub">Quản lý tuyển dụng</p>
        </div>
      </div>

      <nav class="menu-list" aria-label="Recruiter navigation">
        <a
          routerLink="overview"
          routerLinkActive="is-active"
          class="menu-item"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Dashboard
        </a>

        <a
          routerLink="jobs"
          routerLinkActive="is-active"
          class="menu-item"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Danh sách công việc đăng tải
        </a>

        <a
          routerLink="jobs/post-job"
          routerLinkActive="is-active"
          class="menu-item menu-sub-item"
        >
          Đăng tải công việc
        </a>
      </nav>

      <button class="logout-btn" type="button" (click)="onLogout()">
        Đăng xuất
      </button>
    </aside>

    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</section>
