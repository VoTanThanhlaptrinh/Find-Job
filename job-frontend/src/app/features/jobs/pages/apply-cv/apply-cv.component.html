<section class="banner-area relative" id="mini">
  <div class="overlay overlay-bg"></div>
  
</section>
<section class="relative overflow-hidden bg-slate-50 py-6 sm:py-10">
  <div
    class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top,#dbeafe_0%,#f8fafc_55%)]"
  ></div>
  <div class="mx-auto w-full max-w-2xl px-4 sm:px-6 lg:px-8">
    <div class="flex">
      <section
        class="w-full rounded-2xl border border-slate-200 bg-white p-5 shadow-sm sm:p-7"
      >
        <h3 class="text-2xl font-bold text-slate-900">{{ 'applyCv.title' | t }}</h3>
        <p class="mt-1 text-sm text-slate-500">
          {{ 'applyCv.subtitle' | t }}
        </p>

        <form
          class="mt-6 space-y-6"
          [formGroup]="applyCvForm"
          (ngSubmit)="onSubmit()"
        >
          <div class="space-y-3">
            <p class="text-sm font-semibold text-slate-900">{{ 'applyCv.cvSource' | t }}</p>

            <label
              class="flex cursor-pointer items-start gap-3 rounded-xl border p-4 transition"
              [class.border-blue-600]="isMode('existing')"
              [class.bg-blue-50]="isMode('existing')"
              [class.border-slate-200]="!isMode('existing')"
              [class.bg-white]="!isMode('existing')"
            >
              <input
                type="radio"
                formControlName="cvMode"
                value="existing"
                (change)="setCvMode('existing')"
                class="mt-1 h-4 w-4 border-slate-300 text-blue-600"
              />
              <div class="min-w-0 flex-1">
                <p class="font-semibold text-slate-900">
                  {{ 'applyCv.useExistingCv' | t }}
                </p>
                <select
                  formControlName="existingCvId"
                  class="mt-3 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-700 focus:border-blue-500 focus:outline-none"
                  [disabled]="!isMode('existing')"
                >
                  @for (cv of previousCvOptions; track cv.id) {
                    <option [value]="cv.id">
                      {{ cv.fileName }}
                    </option>
                  }
                </select>

                @if (isMode('existing') && selectedExistingCv) {
                  <app-resume-review [resume]="selectedExistingCv"></app-resume-review>
                }
              </div>
            </label>

            <label
              class="flex cursor-pointer items-start gap-3 rounded-xl border p-4 transition"
              [class.border-blue-600]="isMode('upload')"
              [class.bg-blue-50]="isMode('upload')"
              [class.border-slate-200]="!isMode('upload')"
              [class.bg-white]="!isMode('upload')"
            >
              <input
                type="radio"
                formControlName="cvMode"
                value="upload"
                (change)="setCvMode('upload')"
                class="mt-1 h-4 w-4 border-slate-300 text-blue-600"
              />

              <div class="min-w-0 flex-1">
                <p class="font-semibold text-slate-900">{{ 'applyCv.uploadNewCv' | t }}</p>
                <p class="mb-3 text-sm text-slate-500">
                  {{ 'applyCv.dragDropHint' | t }}
                </p>

                <label
                  for="cvFile"
                  class="block rounded-xl border-2 border-dashed px-4 py-6 text-center transition"
                  [class.border-blue-500]="isDragging"
                  [class.bg-blue-100]="isDragging"
                  [class.border-slate-300]="!isDragging"
                  [class.bg-slate-50]="!isDragging"
                  (dragover)="onDragOver($event)"
                  (dragleave)="onDragLeave($event)"
                  (drop)="onFileDrop($event)"
                >
                  <input
                    id="cvFile"
                    type="file"
                    class="hidden"
                    [accept]="acceptedExtensions"
                    (change)="onFileInputChange($event)"
                    [disabled]="!isMode('upload')"
                  />
                  <p class="text-sm font-medium text-slate-800">
                    {{ 'applyCv.fileRequirements' | t }}
                  </p>
                  <p class="mt-1 text-xs text-slate-500">
                    {{ 'applyCv.fileDropZoneHint' | t }}
                  </p>
                </label>
                @if (isMode("upload") && selectedFile) {
                  <p
                    class="mt-3 rounded-lg bg-emerald-50 px-3 py-2 text-sm text-emerald-700"
                  >
                    {{ 'applyCv.selectedFile' | t }}:
                    <span class="font-semibold">{{ selectedFile.name || ('applyCv.noFileSelected' | t) }}</span>
                    ({{ selectedFileSizeLabel }})
                  </p>
                }
              </div>
            </label>
          </div>

          <div class="flex flex-col gap-4">
            <div>
              <label
                for="email"
                class="mb-1 block text-sm font-medium text-slate-700"
                >{{ 'applyCv.emailLabel' | t }}</label
              >
              <input
                id="email"
                type="email"
                formControlName="email"
                [placeholder]="'applyCv.emailPlaceholder' | t"
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus:border-blue-500 focus:outline-none"
              />
            </div>
          </div>
          <div>
            <label
              for="coverLetter"
              class="mb-1 block text-sm font-medium text-slate-700"
              >{{ 'applyCv.coverLetterLabel' | t }}</label
            >
            <textarea
              id="coverLetter"
              rows="6"
              formControlName="coverLetter"
              [placeholder]="'applyCv.coverLetterPlaceholder' | t"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus:border-blue-500 focus:outline-none"
            ></textarea>
          </div>

          <div class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
            <a
              [routerLink]="['/single', jobId]"
              class="inline-flex items-center justify-center rounded-lg border border-slate-300 px-5 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50"
            >
              {{ 'applyCv.back' | t }}
            </a>
            <button
              type="submit"
              class="inline-flex items-center justify-center rounded-lg bg-blue-600 px-5 py-2.5 text-sm font-semibold text-white hover:bg-blue-700"
            >
              {{ 'applyCv.submit' | t }}
            </button>
          </div>
        </form>
      </section>
    </div>
  </div>
</section>
