<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm transition-opacity duration-300">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg mx-4 overflow-hidden transform transition-all">
    <!-- Header -->
    <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
      <h3 class="text-xl font-bold text-slate-800">{{ 'companyAddress.modal.title' | t }}</h3>
      <div class="rounded-full overflow-hidden hover:bg-slate-100 shrink-0">
        <button type="button" class="w-full h-full p-2 flex items-center justify-center text-slate-500" (click)="onClose()">
          <span class="material-symbols-outlined text-xl">close</span>
        </button>
      </div>
    </div>

    <!-- Body -->
    <div class="p-6">
      <form [formGroup]="addressForm" (ngSubmit)="onSave()" class="space-y-4">
        <!-- City -->
        <div class="space-y-1.5">
          <label for="city" class="block text-sm font-semibold text-slate-700">
            Thành phố / Tỉnh <span class="text-red-500">*</span>
          </label>
          <input
            id="city"
            type="text"
            formControlName="city"
            placeholder="Nhập thành phố hoặc tỉnh"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all"
            [class.border-red-300]="addressForm.get('city')?.invalid && addressForm.get('city')?.touched"
            [class.focus:ring-red-500/20]="addressForm.get('city')?.invalid && addressForm.get('city')?.touched"
            [class.focus:border-red-500]="addressForm.get('city')?.invalid && addressForm.get('city')?.touched"
          />
          <p *ngIf="addressForm.get('city')?.invalid && addressForm.get('city')?.touched" class="text-xs text-red-500 mt-1">
            Thành phố không được bỏ trống
          </p>
        </div>

        <!-- Street -->
        <div class="space-y-1.5">
          <label for="street" class="block text-sm font-semibold text-slate-700">
            Tên đường / Số nhà <span class="text-red-500">*</span>
          </label>
          <input
            id="street"
            type="text"
            formControlName="street"
            placeholder="Nhập tên đường, số nhà"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all"
            [class.border-red-300]="addressForm.get('street')?.invalid && addressForm.get('street')?.touched"
            [class.focus:ring-red-500/20]="addressForm.get('street')?.invalid && addressForm.get('street')?.touched"
            [class.focus:border-red-500]="addressForm.get('street')?.invalid && addressForm.get('street')?.touched"
          />
          <p *ngIf="addressForm.get('street')?.invalid && addressForm.get('street')?.touched" class="text-xs text-red-500 mt-1">
            Tên đường, số nhà không được bỏ trống
          </p>
        </div>

        <!-- Is Default -->
        <div class="flex items-center gap-3 pt-2">
          <label class="relative flex items-center cursor-pointer">
            <input type="checkbox" formControlName="isDefault" class="sr-only peer" />
            <div class="w-5 h-5 border-2 border-slate-300 rounded peer-checked:bg-blue-600 peer-checked:border-blue-600 transition-colors flex items-center justify-center">
              <span class="material-symbols-outlined text-white text-[16px] opacity-0 peer-checked:opacity-100 transition-opacity" style="font-variation-settings: 'wght' 700;">check</span>
            </div>
          </label>
          <span class="text-sm font-medium text-slate-700 cursor-pointer" (click)="addressForm.get('isDefault')?.setValue(!addressForm.get('isDefault')?.value)">
            {{ 'companyAddress.modal.isDefault' | t }}
          </span>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="px-6 py-4 border-t border-slate-100 flex items-center justify-end gap-3 bg-slate-50/50">
      <div class="rounded-full overflow-hidden hover:bg-slate-200 transition-colors">
        <button type="button" class="w-full h-full px-5 py-2 text-sm font-semibold text-slate-600" (click)="onClose()">
          {{ 'companyAddress.modal.cancel' | t }}
        </button>
      </div>
      <div class="rounded-full overflow-hidden bg-blue-600 hover:bg-blue-700 transition-colors shadow-md shadow-blue-500/20">
        <button type="button" class="w-full h-full px-5 py-2 text-sm font-semibold text-white" (click)="onSave()">
          {{ 'companyAddress.modal.save' | t }}
        </button>
      </div>
    </div>
  </div>
</div>
