<main class="bg-re-background text-re-on-surface min-h-screen pb-32 overflow-x-hidden relative pt-10 px-6">
  <div class="max-w-5xl mx-auto relative">
    <!-- Background Atmospheric Blobs -->
    <div class="absolute -top-24 -left-24 w-96 h-96 bg-re-primary-fixed opacity-30 blur-[120px] -z-10 rounded-full">
    </div>
    <div class="absolute top-1/2 -right-24 w-80 h-80 bg-re-tertiary-fixed opacity-20 blur-[100px] -z-10 rounded-full">
    </div>
    <form [formGroup]="postJobFG" class="space-y-8">
      <!-- Section 1: Basic Information -->
      <section class="bg-re-surface-container-lowest rounded-xl p-8 shadow-xl shadow-blue-900/5 border border-white/50">
        <div class="flex items-center gap-3 mb-8">
          <div class="w-1.5 h-6 bg-re-primary rounded-full"></div>
          <h2 class="text-xl font-headline font-extrabold text-re-on-surface tracking-tight">
            {{ 'recruiterPostJob.basicInfo' | t }}
          </h2>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <div class="lg:col-span-2">
            <label class="block text-xs font-label font-semibold text-slate-500 uppercase tracking-widest mb-2 px-1">
              {{ 'recruiterPostJob.jobTitle' | t }}
            </label>
            <input formControlName="jobName"
              class="w-full bg-re-surface-container-low/50 border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-re-primary/20 text-re-on-surface transition-all"
              [placeholder]="'recruiterPostJob.jobTitlePlaceholder' | t" type="text" />
          </div>
          <div>
            <label class="block text-xs font-label font-semibold text-slate-500 uppercase tracking-widest mb-2 px-1">
              {{ 'recruiterPostJob.jobType' | t }}
            </label>
            <select title="select" formControlName="jobType"
              class="w-full bg-re-surface-container-low/50 border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-re-primary/20 text-re-on-surface transition-all appearance-none">
              <option value="FULL_TIME">{{ 'recruiterPostJob.jobTypeOptions.fullTime' | t }}</option>
              <option value="PART_TIME">{{ 'recruiterPostJob.jobTypeOptions.partTime' | t }}</option>
              <option value="HYBRID">{{ 'recruiterPostJob.jobTypeOptions.hybrid' | t }}</option>
              <option value="REMOTE">{{ 'recruiterPostJob.jobTypeOptions.remote' | t }}</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-label font-semibold text-slate-500 uppercase tracking-widest mb-2 px-1">
              {{ 'recruiterPostJob.salary' | t }}
            </label>
            <input formControlName="salary"
              class="w-full bg-re-surface-container-low/50 border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-re-primary/20 text-re-on-surface transition-all"
              [placeholder]="'recruiterPostJob.salaryPlaceholder' | t" type="text" />
          </div>
          <div>
            <label class="block text-xs font-label font-semibold text-slate-500 uppercase tracking-widest mb-2 px-1">
              {{ 'recruiterPostJob.headcount' | t }}
            </label>
            <input formControlName="headCount"
              class="w-full bg-re-surface-container-low/50 border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-re-primary/20 text-re-on-surface transition-all"
              [placeholder]="'recruiterPostJob.headcountPlaceholder' | t" type="number" />
          </div>
          <div>
            <label class="block text-xs font-label font-semibold text-slate-500 uppercase tracking-widest mb-2 px-1">
              {{ 'recruiterPostJob.expiredDate' | t }}
            </label>
            <input title="input" formControlName="deadlineCV"
              class="w-full bg-re-surface-container-low/50 border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-re-primary/20 text-re-on-surface transition-all"
              type="date" />
          </div>
          <div class="lg:col-span-3">
            <label class="block text-xs font-label font-semibold text-slate-500 uppercase tracking-widest mb-2 px-1">
              {{ 'recruiterPostJob.address' | t }}
            </label>
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-4 top-3.5 text-slate-400 pointer-events-none">location_on</span>
              <select title="address" formControlName="location"
                class="w-full bg-re-surface-container-low/50 border-none rounded-xl pl-12 pr-10 py-3.5 focus:ring-2 focus:ring-re-primary/20 text-re-on-surface transition-all appearance-none cursor-pointer"
                [class.ring-2]="postJobFG.get('location')?.invalid && postJobFG.get('location')?.touched"
                [class.ring-red-500]="postJobFG.get('location')?.invalid && postJobFG.get('location')?.touched">
                <option value="" disabled selected>{{ 'recruiterPostJob.addressPlaceholder' | t }}</option>
                @for (addr of companyAddresses; track addr.id) {
                <option [value]="addr.id">{{ addr.city }} - {{ addr.street }}</option>
                }
              </select>
              <span
                class="material-symbols-outlined absolute right-4 top-3.5 text-slate-400 pointer-events-none">expand_more</span>
            </div>
          </div>
        </div>
      </section>
      <!-- Section 2: Portfolio Details -->
      <section class="bg-re-surface-container-lowest rounded-xl p-8 shadow-xl shadow-blue-900/5 border border-white/50">
        <div class="flex items-center gap-3 mb-8">
          <div class="w-1.5 h-6 bg-re-tertiary rounded-full"></div>
          <h2 class="text-xl font-headline font-extrabold text-re-on-surface tracking-tight">
            {{ 'recruiterPostJob.profileDetails' | t }}
          </h2>
        </div>
        <div class="space-y-8">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
              <label class="block text-xs font-label font-semibold text-slate-500 uppercase tracking-widest mb-2 px-1">
                {{ 'recruiterPostJob.description' | t }}
              </label>
              <textarea formControlName="jobDescription"
                class="w-full bg-re-surface-container-low/50 border-none rounded-xl px-4 py-4 focus:ring-2 focus:ring-re-primary/20 text-re-on-surface transition-all resize-none"
                [placeholder]="'recruiterPostJob.descriptionPlaceholder' | t" rows="4"></textarea>
            </div>
            <div>
              <label class="block text-xs font-label font-semibold text-slate-500 uppercase tracking-widest mb-2 px-1">
                Kỹ năng chuyên môn
              </label>
              <textarea formControlName="jobSkill"
                class="w-full bg-re-surface-container-low/50 border-none rounded-xl px-4 py-4 focus:ring-2 focus:ring-re-primary/20 text-re-on-surface transition-all resize-none"
                placeholder="Ví dụ: Java, Spring Boot, React..." rows="4"></textarea>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
              <label class="block text-xs font-label font-semibold text-slate-500 uppercase tracking-widest mb-2 px-1">
                {{ 'recruiterPostJob.requirements' | t }}
              </label>
              <textarea formControlName="jobRequirement"
                class="w-full bg-re-surface-container-low/50 border-none rounded-xl px-4 py-4 focus:ring-2 focus:ring-re-primary/20 text-re-on-surface transition-all resize-none"
                [placeholder]="'recruiterPostJob.requirementsPlaceholder' | t" rows="5"></textarea>
            </div>
            <div>
              <label class="block text-xs font-label font-semibold text-slate-500 uppercase tracking-widest mb-2 px-1">
                {{ 'recruiterPostJob.benefits' | t }}
              </label>
              <textarea formControlName="moreDetail"
                class="w-full bg-re-surface-container-low/50 border-none rounded-xl px-4 py-4 focus:ring-2 focus:ring-re-primary/20 text-re-on-surface transition-all resize-none"
                [placeholder]="'recruiterPostJob.benefitsPlaceholder' | t" rows="5"></textarea>
            </div>
          </div>
        </div>
      </section>

      <!-- Section 3: AI Analysis -->
      <section class="bg-re-surface-container-lowest rounded-xl p-8 shadow-xl shadow-blue-900/5 border border-white/50">
        <div class="flex items-center gap-3 mb-8">
          <div class="w-1.5 h-6 bg-indigo-500 rounded-full"></div>
          <h2 class="text-xl font-headline font-extrabold text-re-on-surface tracking-tight">
            {{ 'recruiterPostJob.aiAnalysis' | t }}
          </h2>
        </div>
        <div
          class="flex items-center justify-between p-5 bg-gradient-to-r from-indigo-50/50 to-blue-50/50 rounded-xl border border-indigo-100/50">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-indigo-100 rounded-xl flex items-center justify-center">
              <span class="material-symbols-outlined text-indigo-600 text-2xl">psychology</span>
            </div>
            <div>
              <p class="text-base font-bold text-slate-800">{{ 'recruiterPostJob.aiAnalysisToggle' | t }}</p>
              <p class="text-sm text-slate-500 mt-0.5">{{ 'recruiterPostJob.aiAnalysisDesc' | t }}</p>
            </div>
          </div>
          <button type="button" role="switch" [attr.aria-checked]="postJobFG.get('enableAiAnalysis')?.value"
            class="relative inline-flex h-7 w-12 items-center rounded-full transition-colors"
            [ngClass]="postJobFG.get('enableAiAnalysis')?.value ? 'bg-indigo-600' : 'bg-slate-200'"
            (click)="postJobFG.get('enableAiAnalysis')?.setValue(!postJobFG.get('enableAiAnalysis')?.value)">
            <span class="inline-block h-5 w-5 transform rounded-full bg-white transition-transform shadow-sm"
              [ngClass]="postJobFG.get('enableAiAnalysis')?.value ? 'translate-x-6' : 'translate-x-1'"></span>
          </button>
        </div>
      </section>
    </form>

  </div>
  <!-- Floating Action Bar -->
  <div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50">
    <div
      class="flex items-center gap-4 bg-white/80 backdrop-blur-2xl px-6 py-2 rounded-2xl shadow-[0_-10px_40px_rgba(0,74,198,0.12)] border border-white/50 min-w-[320px] justify-between">
      <div class="rounded-xl overflow-hidden hover:bg-slate-100/50 transition-colors">
        <button
          class="flex items-center justify-center gap-2 text-slate-500 text-sm font-label font-medium px-4 py-2 active:scale-95 w-full h-full">
          <span class="material-symbols-outlined text-[18px]">visibility</span>
          <span>{{ 'recruiterPostJob.preview' | t }}</span>
        </button>
      </div>
      <div
        class="rounded-lg overflow-hidden shadow-lg shadow-blue-500/30 hover:shadow-blue-500/40 transition-shadow bg-re-primary-container">
        <button type="submit" [disabled]="isSubmitting"
          (click)="onSubmit()"
          class="flex items-center justify-center gap-2 text-white text-sm font-label font-bold px-6 py-2 transition-all active:scale-95 duration-200 w-full h-full disabled:opacity-50">
          <span class="material-symbols-outlined text-[18px]">save</span>
          <span>{{ isSubmitting ? 'Đang lưu...' : ('recruiterPostJob.saveJob' | t) }}</span>
        </button>
      </div>
    </div>
  </div>
  <!-- Background Decoration -->
  <div class="fixed bottom-0 right-0 w-full h-1 bg-gradient-to-r from-re-primary to-re-tertiary opacity-20"></div>
</main>
