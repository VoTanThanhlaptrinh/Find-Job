<main class="bg-re-surface text-re-on-surface min-h-screen p-6 md:p-10">
  <section class="max-w-6xl mx-auto space-y-6">
    <header class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold">{{ 'recruiterJobList.title' | t }}</h1>
        <p class="text-re-on-surface-variant mt-1">
          {{ 'recruiterJobList.totalPostedJobs' | t }}: <span class="font-semibold">{{ totalPostedJobs }}</span>
        </p>
      </div>

      <a
        class="inline-flex items-center gap-2 bg-re-primary text-re-on-primary px-4 py-2 rounded-full font-semibold"
        routerLink="/recruiter/jobs/post-job"
      >
        <span class="material-symbols-outlined">add</span>
        {{ 'recruiterJobList.postJob' | t }}
      </a>
    </header>

    <div
      *ngIf="isLoading"
      class="bg-re-surface-container-low p-5 rounded-xl text-re-on-surface-variant"
    >
      {{ 'recruiterJobList.loading' | t }}
    </div>

    <div
      *ngIf="!isLoading && jobs.length === 0"
      class="bg-re-surface-container-low p-6 rounded-xl text-re-on-surface-variant"
    >
      {{ 'recruiterJobList.empty' | t }}
    </div>

    <div *ngIf="!isLoading && jobs.length > 0" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <app-hirer-job-card
        *ngFor="let job of jobs; trackBy: trackByJob"
        [job]="job"
        (delete)="deleteJob($event)"
      ></app-hirer-job-card>
    </div>

    <footer
      *ngIf="!isLoading && jobs.length > 0"
      class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between pt-2"
    >
      <div class="flex items-center gap-2 text-sm">
        <label for="job-page-size">{{ 'pagination.rowsPerPage' | t }}</label>
        <select
          id="job-page-size"
          class="bg-re-surface-container-low border border-re-outline-variant/20 rounded-lg px-2 py-1"
          [value]="currentPageSize"
          (change)="onPageSizeChange($event)"
        >
          <option *ngFor="let option of pageSizeOptions" [value]="option">{{ option }}</option>
        </select>
      </div>

      <div class="flex items-center gap-2">
        <button
          type="button"
          class="px-3 py-1.5 rounded-lg border border-re-outline-variant/30 disabled:opacity-40"
          [disabled]="!canGoPrev"
          (click)="goPrevPage()"
        >
          {{ 'pagination.previous' | t }}
        </button>

        <button
          type="button"
          *ngFor="let page of pageButtons"
          class="px-3 py-1.5 rounded-lg border border-re-outline-variant/30"
          [class.bg-re-primary]="page === currentPage"
          [class.text-re-on-primary]="page === currentPage"
          (click)="goToPage(page)"
        >
          {{ page }}
        </button>

        <button
          type="button"
          class="px-3 py-1.5 rounded-lg border border-re-outline-variant/30 disabled:opacity-40"
          [disabled]="!canGoNext"
          (click)="goNextPage()"
        >
          {{ 'pagination.next' | t }}
        </button>
      </div>
    </footer>
  </section>
</main>
