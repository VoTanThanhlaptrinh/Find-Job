<main class="bg-re-surface text-re-on-surface min-h-screen p-6 md:p-10" (click)="closeMenu()">
  <section class="max-w-5xl mx-auto space-y-6" (click)="$event.stopPropagation()">
    <header class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold">Quan ly dia chi cong ty</h1>
        <p class="text-re-on-surface-variant mt-1">Danh sach dang dung mock data cho den khi co API contract</p>
      </div>
      <button
        type="button"
        class="inline-flex items-center gap-2 bg-re-primary text-re-on-primary px-4 py-2 re-rounded-full font-semibold"
        (click)="addAddress()"
      >
        <span class="material-symbols-outlined">add</span>
        Them dia chi
      </button>
    </header>

    <div *ngIf="addresses.length === 0" class="bg-re-surface-container-low p-5 re-rounded-xl text-re-on-surface-variant">
      Chua co dia chi nao.
    </div>

    <ul *ngIf="addresses.length > 0" class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <li
        *ngFor="let address of addresses; trackBy: trackByAddressId"
        class="bg-re-surface-container-lowest border border-re-outline-variant/20 p-5 re-rounded-2xl relative"
      >
        <div class="flex justify-between gap-3">
          <div>
            <div class="flex items-center gap-2">
              <h2 class="font-semibold text-lg">{{ address.locationName }}</h2>
              <span *ngIf="address.isDefault" class="text-xs px-2 py-0.5 re-rounded-full bg-emerald-100 text-emerald-700">
                Mac dinh
              </span>
            </div>
            <p class="text-sm text-re-on-surface-variant mt-1">{{ address.fullAddress }}</p>
          </div>

          <div class="relative">
            <button
              type="button"
              class="w-9 h-9 re-rounded-full bg-re-surface-container flex items-center justify-center"
              (click)="toggleMenu(address.id); $event.stopPropagation()"
            >
              <span class="material-symbols-outlined">more_vert</span>
            </button>

            <div
              *ngIf="openMenuId === address.id"
              class="absolute right-0 mt-2 min-w-32 bg-re-surface-container-lowest border border-re-outline-variant/20 shadow-md re-rounded-xl p-1 z-10"
            >
              <button
                type="button"
                class="w-full text-left px-3 py-2 text-sm text-re-error hover:bg-re-error-fixed hover:text-re-on-error-fixed re-rounded-lg"
                (click)="deleteAddress(address); $event.stopPropagation()"
              >
                Xoa
              </button>
            </div>
          </div>
        </div>

        <div class="mt-4 pt-4 border-t border-re-outline-variant/20 text-sm text-re-on-surface-variant space-y-1">
          <p>Nguoi lien he: <span class="text-re-on-surface font-medium">{{ address.contactName }}</span></p>
          <p>Dien thoai: <span class="text-re-on-surface font-medium">{{ address.phone }}</span></p>
        </div>
      </li>
    </ul>
  </section>
</main>
