<main class="bg-re-background min-h-screen p-6 md:p-10 text-re-on-surface">
  <section class="max-w-6xl mx-auto space-y-6">
    <header>
      <h1 class="text-2xl md:text-3xl font-bold">Tong quan recruiter</h1>
      <p class="text-re-on-surface-variant mt-1">Du lieu hien thi tu cac API recruiter hien co</p>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
      <article
        *ngFor="let metric of metrics()"
        class="bg-re-surface-container-lowest border border-re-outline-variant/20 p-5 rounded-2xl"
      >
        <p class="text-sm text-re-on-surface-variant">{{ metric.titleKey }}</p>
        <p class="text-2xl font-bold mt-2">{{ metric.value }}</p>
        <p class="text-xs mt-2 text-re-on-surface-variant">{{ metric.trendKey }}</p>
      </article>
    </div>

    <div class="bg-re-surface-container-low p-4 rounded-xl text-sm text-re-on-surface-variant">
      Hien tai API recruiter moi cap metric dem so tin dang dang. Cac metric con lai can endpoint rieng.
    </div>
  </section>
</main>
