<section class="banner-area relative" id="mini">
  <div class="overlay overlay-bg"></div>
</section>
<div
  class="candidate-shell flex min-h-screen w-full max-w-full overflow-x-hidden bg-slate-50 antialiased text-slate-900 font-sans"
>
  <!-- SideNavBar Component -->
  <aside
    role="navigation"
    class="candidate-sidebar left-0 z-50 flex min-h-screen flex-col overflow-hidden border-r border-slate-200 bg-white py-6 transition-all duration-300 ease-in-out"
    [ngClass]="isOpen ? 'w-72' : 'w-20'"
  >
    <!-- Brand Header -->
    <div
      class="mb-8 flex h-12 items-center whitespace-nowrap"
      [ngClass]="isOpen ? 'justify-between px-5' : 'justify-center px-0'"
    >
      <span
        *ngIf="isOpen"
        class="font-display text-2xl font-extrabold tracking-tight text-blue-600"
        >Job Listing</span
      >
      <button
        (click)="toggleSidebar()"
        class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-400 hover:bg-slate-100 transition-colors"
        type="button"
      >
        <span class="material-symbols-outlined">{{
          isOpen ? "menu_open" : "menu"
        }}</span>
      </button>
    </div>
    <!-- Navigation Tabs -->
    <nav
      class="flex-1 space-y-1 overflow-y-auto overflow-x-hidden"
      [ngClass]="isOpen ? 'px-3' : 'px-2'"
    >
      @for (item of menuItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="text-blue-600 font-bold bg-blue-50"
          [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
          class="flex min-w-0 items-center rounded-xl py-2.5 transition-all duration-200 text-slate-600 hover:bg-slate-100 hover:text-blue-600 group"
          [ngClass]="
            isOpen ? 'justify-start gap-3 px-3' : 'justify-center gap-0 px-0'
          "
          (click)="onMenuItemClick()"
        >
          <span class="sidebar-icon material-symbols-outlined text-[22px]">{{
            item.icon
          }}</span>
          <span *ngIf="isOpen" class="min-w-0 truncate whitespace-nowrap">{{
            item.nameKey | t
          }}</span>
        </a>
      }
    </nav>

    <!-- Footer Tab: Logout -->
    <div
      class="mt-auto border-t border-slate-100 pt-5"
      [ngClass]="isOpen ? 'px-3' : 'px-2'"
    >
      <a
        href="javascript:void(0)"
        class="flex min-w-0 items-center rounded-xl py-2.5 transition-all duration-200 text-slate-600 hover:bg-red-50 hover:text-red-600 group"
        [ngClass]="
          isOpen ? 'justify-start gap-3 px-3' : 'justify-center gap-0 px-0'
        "
      >
        <span class="sidebar-icon material-symbols-outlined text-[22px]"
          >logout</span
        >
        <span
          *ngIf="isOpen"
          class="min-w-0 truncate whitespace-nowrap font-medium"
          >{{ 'header.logout' | t }}</span
        >
      </a>
    </div>
  </aside>

  <div
    class="min-w-0 flex-1 w-full max-w-full overflow-x-hidden transition-all duration-300 ease-in-out"
    [ngClass]="isOpen ? 'ml-50' : 'ml-20'"
  >
    <div class="min-h-screen min-w-0 max-w-full overflow-x-hidden p-2 md:p-4">
      <!-- MAIN ROUTER OUTLET PRESERVED -->
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
