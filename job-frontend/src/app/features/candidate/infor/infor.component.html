<section class="banner-area relative" id="mini">
  <div class="overlay overlay-bg"></div>
</section>
<div
  class="candidate-shell flex h-[90vh] w-full max-w-full overflow-x-hidden bg-slate-50 antialiased text-slate-900 font-sans">
  <!-- SideNavBar Component -->
  <aside role="navigation"
    class="candidate-sidebar sticky top-0 h-[90vh] left-0 z-50 flex flex-col border-r border-slate-200 bg-white py-6 transition-all duration-300 ease-in-out"
    [ngClass]="isOpen ? 'w-72' : 'w-20'">
    <!-- Toggle Button on Border -->
    <button (click)="toggleSidebar()"
      class="absolute top-10 -right-4 flex h-8! w-8! aspect-square! p-0! m-0! items-center justify-center! rounded-full! border border-slate-200 bg-white text-slate-500 hover:text-blue-600 hover:border-blue-300 hover:bg-slate-50 shadow-sm transition-all focus:outline-none z-50"
      [title]="isOpen ? 'Thu gọn' : 'Mở rộng'">
      <span class="material-symbols-outlined text-[18px] transition-transform duration-300"
        [class.rotate-180]="!isOpen">
        chevron_left
      </span>
    </button>
    <!-- Navigation Tabs -->
    <nav class="flex-1 space-y-1 overflow-y-auto overflow-x-hidden" [ngClass]="isOpen ? 'px-3' : 'px-2'">
      @for (item of menuItems; track item.route) {
      <a [routerLink]="item.route" class="flex min-w-0 items-center rounded-xl py-2 transition-all duration-200 group"
        [ngClass]="[
          isOpen ? 'justify-start gap-3 px-3' : 'justify-center gap-0 px-0',
          isActive(item.route, item.exact)
            ? 'bg-blue-600! text-white font-bold shadow-md' 
            : 'text-slate-600 hover:bg-slate-100 hover:text-blue-600'
        ]" (click)="onMenuItemClick()">
        <span class="sidebar-icon material-symbols-outlined text-[22px]">{{
          item.icon
          }}</span>
        <span *ngIf="isOpen" class="min-w-0 truncate whitespace-nowrap">{{
          item.nameKey | t
          }}</span>
      </a>
      }
    </nav>

    <!-- Footer Tab: Logout -->
    <div class="mt-auto border-t border-slate-100" [ngClass]="isOpen ? 'px-3' : 'px-2'">
      <a href="javascript:void(0)"
        class="flex min-w-0 items-center rounded-md transition-all duration-200 text-slate-600 hover:bg-red-50 hover:text-red-600 group"
        [ngClass]="
          isOpen ? 'justify-start gap-3 px-3' : 'justify-center gap-0 px-0'
        ">
        <span class="sidebar-icon material-symbols-outlined text-[22px]">logout</span>
        <span *ngIf="isOpen" class="min-w-0 truncate whitespace-nowrap font-medium">{{ 'header.logout' | t }}</span>
      </a>
    </div>
  </aside>

  <div class="min-w-0 flex-1 w-full max-w-full overflow-x-hidden transition-all duration-300 ease-in-out"
    [ngClass]="isOpen ? 'ml-50' : 'ml-20'">
    <div class="min-h-full min-w-0 max-w-full overflow-x-hidden p-2 md:p-4">
      <!-- MAIN ROUTER OUTLET PRESERVED -->
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
