<div role="main" class="max-w-4xl w-full mx-auto antialiased text-slate-900 px-4 md:px-0 py-8">
  <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
    <!-- Header Section -->
    <div role="banner" class="px-8 pt-8 pb-8 border-b border-slate-100">
      <div class="flex flex-col md:flex-row items-center gap-8">
        <div class="relative group">
          <img 
            alt="Candidate Profile" 
            class="w-28 h-28 rounded-full object-cover border-2 border-slate-100 shadow-sm" 
            src="assets/images/avatar.jpg"
          />
          <button class="absolute bottom-0 right-0 bg-blue-600 text-white p-2 rounded-full shadow-md hover:bg-blue-700 transition-colors border-2 border-white">
            <span class="material-symbols-outlined text-sm block">photo_camera</span>
          </button>
        </div>
        <div class="text-center md:text-left">
          <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">{{ title() }}</h1>
          <p class="text-slate-500 mt-1">{{ subtitle() }}</p>
        </div>
      </div>
    </div>

    <!-- Form Content -->
    <form [formGroup]="formGroup" (ngSubmit)="onSubmit()" class="p-8 space-y-10">
      <!-- Section: Basic Info -->
      <div class="space-y-6">
        <div class="flex items-center gap-2.5">
          <span class="material-symbols-outlined text-blue-600 font-semibold">person</span>
          <h2 class="text-lg font-bold text-slate-900">{{ basicInfoLabel() }}</h2>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
          <!-- Full Name -->
          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-slate-700" for="full_name">
              {{ fullNameLabel() }} <span class="text-red-500">*</span>
            </label>
            <input 
              class="w-full px-4 py-2.5 rounded-lg border border-slate-200 bg-white focus:ring-2 focus:ring-blue-600/20 focus:border-blue-600 transition-all outline-none text-slate-900 placeholder:text-slate-400" 
              id="full_name" 
              type="text" 
              [placeholder]="fullNamePlaceholder()" 
              formControlName="fullName"
            />
            <p class="text-[11px] text-slate-400 italic">{{ fullNameHint() }}</p>
          </div>

          <!-- Date of Birth (Using MatDatepicker within new UI style) -->
          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-slate-700" for="dob">
              {{ dobLabel() }} <span class="text-red-500">*</span>
            </label>
            <div class="relative custom-datepicker-container">
              <input title="input"
                class="w-full px-4 py-2.5 rounded-lg border border-slate-200 bg-white focus:ring-2 focus:ring-blue-600/20 focus:border-blue-600 transition-all outline-none text-slate-900 z-10 active:bg-white cursor-pointer" 
                [matDatepicker]="picker" 
                formControlName="dateOfBirth"
                readonly
                (click)="picker.open()"
              />
              <mat-datepicker-toggle class="absolute right-1 top-1/2 -translate-y-1/2" [for]="picker"></mat-datepicker-toggle>
              <mat-datepicker #picker panelClass="profile-datepicker-panel"></mat-datepicker>
            </div>
          </div>

          <!-- Mobile Number -->
          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-slate-700" for="phone">
              {{ phoneLabel() }} <span class="text-red-500">*</span>
            </label>
            <div class="relative flex">
              <span class="flex items-center px-4 py-2.5 bg-slate-50 border border-r-0 border-slate-200 rounded-l-lg text-slate-500 font-medium text-sm">+84</span>
              <input 
                class="w-full px-4 py-2.5 rounded-r-lg border border-slate-200 bg-white focus:ring-2 focus:ring-blue-600/20 focus:border-blue-600 transition-all outline-none text-slate-900 placeholder:text-slate-400" 
                id="phone" 
                type="tel" 
                [placeholder]="phonePlaceholder()" 
                formControlName="mobile"
              />
            </div>
          </div>

          <!-- Address -->
          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-slate-700" for="address">
              {{ addressLabel() }} <span class="text-red-500">*</span>
            </label>
            <input 
              class="w-full px-4 py-2.5 rounded-lg border border-slate-200 bg-white focus:ring-2 focus:ring-blue-600/20 focus:border-blue-600 transition-all outline-none text-slate-900 placeholder:text-slate-400" 
              id="address" 
              type="text" 
              [placeholder]="addressPlaceholder()" 
              formControlName="address"
            />
          </div>
        </div>
      </div>

      <!-- Action Footer -->
      <div role="contentinfo" class="flex items-center justify-between pt-8 border-t border-slate-100">
        <button type="button" class="text-slate-500 hover:text-blue-600 font-semibold text-sm transition-colors flex items-center gap-2 group">
          <span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform">arrow_back</span>
          {{ backLabel() }}
        </button>
        <div class="flex gap-4">
          <button type="button" class="px-6 py-2.5 rounded-lg border border-slate-200 text-slate-700 font-semibold text-sm hover:bg-slate-50 transition-colors">
            {{ cancelLabel() }}
          </button>
          <button 
            type="submit" 
            class="px-8 py-2.5 rounded-lg bg-blue-600 text-white hover:bg-blue-700 font-bold text-sm shadow-sm active:scale-[0.98] transition-all flex items-center gap-2 disabled:opacity-50"
            [disabled]="formGroup.invalid"
          >
            <span class="material-symbols-outlined text-lg">save</span>
            {{ updateLabel() }}
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- Decorative background elements -->
<div class="fixed top-0 left-0 -z-10 w-full h-full pointer-events-none overflow-hidden opacity-50">
  <div class="absolute -top-[10%] -right-[5%] w-[40%] h-[40%] bg-blue-600/5 blur-[120px] rounded-full"></div>
  <div class="absolute -bottom-[10%] -left-[5%] w-[30%] h-[30%] bg-blue-600/5 blur-[100px] rounded-full"></div>
</div>
