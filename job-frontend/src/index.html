<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>JobList</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="google" content="notranslate" />
    <meta
      http-equiv="Content-Security-Policy"
      content="script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.tailwindcss.com"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <style>
      /* Color tokens based on DESIGN.md / tailwind.config.js */
      :root {
        --color-re-primary: #004ac6;
        --color-re-primary-container: #2563eb;
        --color-re-secondary: #006591;
        --color-re-background: #f7f9fb;
        --color-re-on-surface: #191c1e;
        --color-re-on-surface-variant: #434655;
        --color-re-surface-container-lowest: #ffffff;
        --color-re-surface-container-low: #f2f4f6;
        --color-re-surface-container-high: #e6e8ea;
        --color-re-outline-variant: #c3c6d7;
      }

      /* Base styles for the simple loading screen */
      .app-loading-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-color: var(--color-re-background, #f7f9fb);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 1;
        transition: opacity 0.4s ease-out;
      }

      .app-loading-screen.app-loading--hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* Simple spinner */
      .simple-spinner {
        width: 3rem;
        height: 3rem;
        border: 4px solid var(--color-re-surface-container-high, #e6e8ea);
        border-top-color: var(--color-re-primary, #004ac6);
        border-radius: 50%;
        animation: simple-spin 1s linear infinite;
        margin-bottom: 1rem;
      }

      .simple-loading-text {
        color: var(--color-re-on-surface-variant, #434655);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 0.875rem;
        font-weight: 500;
        animation: simple-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes simple-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes simple-pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
    </style>
  </head>

  <body>
    <!-- App Loading Screen Overlay -->
    <div id="app-loading-screen" class="app-loading-screen">
      <div class="simple-spinner"></div>
      <div class="simple-loading-text">Đang tải dữ liệu...</div>
    </div>

    <app-root></app-root>
  </body>
</html>
